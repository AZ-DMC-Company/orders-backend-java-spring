# ---------------------------
# Base de datos MySQL
# ---------------------------
spring.datasource.url=jdbc:mysql://orders-mysqlserver-dev.mysql.database.azure.com:3306/orders_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=mysqladmin
spring.datasource.password=ChangeMe123!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------------------------
# JPA / Hibernate
# ---------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ---------------------------
# Spring Boot Actuator
# ---------------------------
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

